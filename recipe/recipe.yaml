schema_version: 1

context:
  version: "1.8.0"

package:
  name: sagemaker-train
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/sagemaker-train/sagemaker_train-${{ version }}.tar.gz
  sha256: e241e99c6c3dec0d0464f33e6da87bc45db97867b7ed1f02ff2e264553fac54b

build:
  number: 0
  noarch: python
  script: |
    ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    rm -f $SP_DIR/sagemaker/__init__.py
    rm -rf $SP_DIR/sagemaker/__pycache__

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=64
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - sagemaker-core >=2.5.0
    - sagemaker-mlflow >=0.0.1,<1.0.0
    - graphene >=3,<4
    - typing_extensions >=4.9.0
    - tblib >=1.7.0
    - pyyaml >=6.0,<7.0
    - paramiko >=2.11.0
    - jinja2 >=3.0,<4.0
    - mlflow >=3.0.0,<4.0.0
    - nest-asyncio >=1.5.0

tests:
  - python:
      imports:
        - sagemaker.train
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
about:
  summary: SageMaker Train package for training and deploying models
  homepage: https://github.com/aws/sagemaker-python-sdk
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://sagemaker.readthedocs.io/en/stable/
  repository: https://github.com/aws/sagemaker-python-sdk

extra:
  recipe-maintainers:
    - mollyheamazon
    - mufaddal-rohawala
    - nargokul
